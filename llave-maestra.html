    function tryDesigner(){
      /* La clave ya no se compara en el cliente: se guarda y el SERVIDOR la
         valida en cada escritura (vive en Script Properties del Apps Script). */
      var k=prompt("Clave de diseñadora:"); if(k==null) return;
      k=String(k).trim(); if(!k){ alert("Escribe la clave."); return; }
      try{sessionStorage.setItem(WSEC_KEY,k);}catch(e){}
      state.designer=true; try{sessionStorage.setItem(DESIGNER_FLAG,"1");}catch(e){} render();
    }
    function exitDesigner(){ state.designer=false; try{sessionStorage.removeItem(DESIGNER_FLAG);sessionStorage.removeItem(WSEC_KEY);}catch(e){} render(); }

    /* --- editor: abrir --- */
    function openEd(table,key){
      if(table==="__concept") return openConcept();
      if(table==="__mood") return openMood();
      var sc=SCHEMA[table]; if(!sc) return;
      var isNew=(key==null||key==="");
      var rec=isNew?blankRec(table):(recOf(table,key)||blankRec(table));
      var dkey="aurum_draft_"+table+"_"+(isNew?"__new":key);
      var draft=null; try{draft=JSON.parse(localStorage.getItem(dkey));}catch(e){}
      ED={kind:"row",table:table,key:(isNew?null:key),dkey:dkey,rec:assign({},rec,draft||{})};
      renderRowEditor();
    }
    function renderRowEditor(){
      var sc=SCHEMA[ED.table], rec=ED.rec;
      var body=sc.f.map(function(f){
        var v=rec[f]==null?"":rec[f], lab=FLABEL[f]||f, inp;
        if(f in SELECTF) inp='<select data-f="'+f+'"><option value="">—</option>'+SELECTF[f].map(function(o){return '<option'+(String(v)===o?' selected':'')+'>'+esc(o)+'</option>';}).join("")+'</select>';
        else if(f in TAREA) inp='<textarea data-f="'+f+'" rows="2">'+esc(v)+'</textarea>';
        else inp='<input data-f="'+f+'" type="'+((f in NUMF)?"number":"text")+'" value="'+esc(v)+'"'+(f==="id"&&ED.key!=null?' readonly style="opacity:.55"':'')+'>';
        var extra=(f==="img"&&String(v).trim())?'<img class="ed-prev" src="'+esc(imgUrlSm(v))+'" alt="" onerror="this.style.display=\'none\'">':'';
        return '<label class="ed-row"><span>'+esc(lab)+'</span>'+inp+extra+'</label>';
      }).join("");
      showEditor((ED.key==null?"Agregar ":"Editar ")+sc.label, body, ED.key!=null);
    }
    function showEditor(title, bodyHtml, showDelete){
      document.getElementById("ed-title").textContent=title;
      document.getElementById("ed-body").innerHTML=bodyHtml;
      document.getElementById("ed-del").style.display=showDelete?"inline-flex":"none";
      var canDup=!!(ED&&ED.kind==="row"&&ED.key!=null&&SCHEMA[ED.table]&&SCHEMA[ED.table].k==="id");
      document.getElementById("ed-dup").style.display=canDup?"inline-flex":"none";
      document.getElementById("ed-save").style.display="inline-flex";
      setEdState("");
      document.getElementById("editor").classList.add("on");
    }
    function setEdState(msg,warn){ var s=document.getElementById("ed-state"); if(s){ s.textContent=msg||""; s.className="ed-state"+(warn?" warn":""); } }
    function edCollect(){ var rec={}; var els=document.querySelectorAll("#ed-body [data-f]"); for(var i=0;i<els.length;i++){ rec[els[i].getAttribute("data-f")]=els[i].value; } ED.rec=assign(ED.rec||{},rec); return ED.rec; }
    function edAutosave(){ if(!ED) return;
      var pim=document.querySelector("#ed-body .ed-prev"), iv=gf("img");
      if(pim&&String(iv).trim()){ pim.style.display="block"; pim.src=imgUrlSm(iv); } if(ED.kind==="row"&&ED.dkey){ edCollect(); try{localStorage.setItem(ED.dkey,JSON.stringify(ED.rec));}catch(e){} setEdState("borrador guardado"); }
      else if(ED.dkey){ var d={}; document.querySelectorAll("#ed-body [data-f]").forEach(function(el){ d[el.getAttribute("data-f")]=el.value; }); try{localStorage.setItem(ED.dkey,JSON.stringify(d));}catch(e){} setEdState("borrador guardado"); } }

    /* --- editor: guardar fila --- */
    function edSave(){
      if(!ED) return;
      if(ED.kind==="concept") return saveConcept();
      if(ED.kind==="mood") return saveMood();
      if(ED.kind!=="row") return;
      var sc=SCHEMA[ED.table], rec=edCollect();
      if("price" in rec && String(rec.price).trim()!=="" && isNaN(Number(String(rec.price).replace(/[$,\s]/g,"")))){ setEdState("El precio debe ser numérico (sin $ ni comas)",true); return; }
      if("price" in rec) rec.price=String(rec.price).replace(/[$,\s]/g,"");
      Object.keys(NUMF).forEach(function(n){ if(n in rec) rec[n]=num(rec[n]); });
      if(sc.k!=="__i" && !String(rec[sc.k]||"").trim()){ setEdState((FLABEL[sc.k]||sc.k)+" es obligatorio",true); return; }
      if(sc.k==="id" && ED.key==null && recOf(ED.table,rec.id)){ setEdState("Ya existe una pieza con el id "+rec.id,true); return; }
      applyRowLocal(ED.table, ED.key, rec);
      var payload;
      if(sc.k==="__i"){ payload = (ED.key==null) ? {action:"append",tab:sc.tab,row:rec} : {action:"setRow",tab:sc.tab,index:Number(ED.key),row:rec}; }
      else { payload = {action:"upsert",tab:sc.tab,keyField:sc.k,key:rec[sc.k],row:rec}; }
      setEdState("guardando…");
      postSheet(payload).then(function(){ setEdState("guardado en el Sheet ✓"); finishEd(true); })
        .catch(function(){ queuePost(payload); setEdState("guardado local; quedó en cola para sincronizar",true); showToast("Sin conexión con el Sheet: el cambio quedó en cola",{warn:true}); finishEd(true); });
    }
    function edDuplicate(){
      if(!ED||ED.kind!=="row") return; var sc=SCHEMA[ED.table]; if(!sc||sc.k!=="id") return;
      var rec=assign({},edCollect()); rec.id=nextId(ED.table); rec.name=String(rec.name||"")+" (copia)";
      applyRowLocal(ED.table,null,rec);
      var payload={action:"upsert",tab:sc.tab,keyField:"id",key:rec.id,row:rec};
      postSheet(payload).then(function(){ showToast("Pieza duplicada y guardada en el Sheet"); })
        .catch(function(){ queuePost(payload); showToast("Duplicada local; quedó en cola para sincronizar",{warn:true}); });
      openEd(ED.table,rec.id); render();
    }
    function applyRowLocal(table,key,rec){
      var sc=SCHEMA[table], arr=AURUM[table]||(AURUM[table]=[]);
      if(key==null){ arr.push(rec); }
      else if(sc.k==="__i"){ arr[Number(key)]=rec; }
      else { for(var i=0;i<arr.length;i++){ if(String(arr[i][sc.k])===String(key)){ arr[i]=rec; loadSelection(); return; } } arr.push(rec); }
      loadSelection();
    }
    function edDelete(){
      if(!ED||ED.key==null) return;
      var sc=SCHEMA[ED.table];
      if(!confirm("¿Eliminar este "+sc.label+"? No se puede deshacer.")) return;
      var arr=AURUM[ED.table]||[];
      if(sc.k==="__i") arr.splice(Number(ED.key),1);
      else AURUM[ED.table]=arr.filter(function(r){ return String(r[sc.k])!==String(ED.key); });
      loadSelection();
      var payload = (sc.k==="__i") ? {action:"delRow",tab:sc.tab,index:Number(ED.key)} : {action:"delete",tab:sc.tab,keyField:sc.k,key:ED.key};
      postSheet(payload).then(function(){}).catch(function(){ queuePost(payload); showToast("Sin conexión: la eliminación quedó en cola",{warn:true}); });
      finishEd(true);
    }
    function finishEd(clearDraft){ if(ED&&ED.dkey&&clearDraft){ try{localStorage.removeItem(ED.dkey);}catch(e){} } setTimeout(function(){ closeEd(); }, 750); }
    function closeEd(){ document.getElementById("editor").classList.remove("on"); ED=null; render(); }

    /* --- editor concepto --- */
    function linesToPairs(txt){ return String(txt||"").split("\n").map(function(l){ l=l.trim(); if(!l) return null; var p=l.split("::"); return {t:(p[0]||"").trim(), d:(p[1]||"").trim()}; }).filter(Boolean); }
    function pairsToLines(arr){ return (arr||[]).map(function(p){ return (typeof p==="string"?p:((p.t||"")+(p.d?" :: "+p.d:""))); }).join("\n"); }
    function gf(f){ var el=document.querySelector('#ed-body [data-f="'+f+'"]'); return el?el.value:""; }
    function openConcept(){
      var c=AURUM.concept||{};
      var dkey="aurum_draft_concept"; var d=null; try{d=JSON.parse(localStorage.getItem(dkey));}catch(e){}
      ED={kind:"concept",dkey:dkey};
      var v=assign({style:c.style||"",statement:c.statement||"",definition:c.definition||"",body:(c.body||[]).join("\n\n"),pillars:pairsToLines(c.pillars)}, d||{});
      var body=''+
        '<label class="ed-row"><span>Estilo</span><input data-f="style" value="'+esc(v.style)+'"></label>'+
        '<label class="ed-row"><span>Statement (frase principal)</span><textarea data-f="statement" rows="3">'+esc(v.statement)+'</textarea></label>'+
        '<label class="ed-row"><span>Definición</span><textarea data-f="definition" rows="2">'+esc(v.definition)+'</textarea></label>'+
        '<label class="ed-row"><span>Cuerpo (un párrafo por bloque; separa con línea en blanco)</span><textarea data-f="body" rows="5">'+esc(v.body)+'</textarea></label>'+
        '<label class="ed-row"><span>Pilares (uno por línea — Título :: Descripción)</span><textarea data-f="pillars" rows="6">'+esc(v.pillars)+'</textarea></label>';
      showEditor("Editar concepto", body, false);
    }
    function saveConcept(){
      var style=gf("style"), statement=gf("statement"), definition=gf("definition");
      var body=String(gf("body")).split(/\n{2,}/).map(function(s){return s.trim();}).filter(Boolean);
      var pillars=linesToPairs(gf("pillars"));
      AURUM.concept=assign({},AURUM.concept||{},{style:style,statement:statement,definition:definition,body:body,pillars:pillars});
      setEdState("guardando…");
      Promise.all([
        postSheet({action:"kv",tab:"Concepto",pairs:{style:style,statement:statement,definition:definition,body1:body[0]||"",body2:body[1]||""}}),
        postSheet({action:"list",tab:"Pilares",header:["titulo","texto"],rows:pillars.map(function(p){return [p.t,p.d];})})
      ]).then(function(){ setEdState("concepto guardado ✓"); finishEd(true); })
       .catch(function(){ setEdState("guardado local; el Sheet no respondió",true); finishEd(false); });
    }
    /* --- editor mood --- */
    function openMood(){
      var md=AURUM.mood||{};
      var dkey="aurum_draft_mood"; var d=null; try{d=JSON.parse(localStorage.getItem(dkey));}catch(e){}
      ED={kind:"mood",dkey:dkey};
      var pal=(md.palette||[]).map(function(p){return (p.name||"")+" :: "+(p.hex||"");}).join("\n");
      var mats=(md.materials||[]).join("\n");
      var tiles=(md.tiles||[]).map(function(t){return [t.label||"",t.note||"",t.img||""].join(" :: ");}).join("\n");
      var v=assign({palette:pal,materials:mats,tiles:tiles}, d||{});
      var body=''+
        '<label class="ed-row"><span>Paleta (una por línea — Nombre :: #hex)</span><textarea data-f="palette" rows="6">'+esc(v.palette)+'</textarea></label>'+
        '<label class="ed-row"><span>Materiales (uno por línea)</span><textarea data-f="materials" rows="6">'+esc(v.materials)+'</textarea></label>'+
        '<label class="ed-row"><span>Imágenes mood (una por línea — Título :: Nota :: link de Drive)</span><textarea data-f="tiles" rows="6">'+esc(v.tiles)+'</textarea></label>';
      showEditor("Editar mood & paleta", body, false);
    }
    function saveMood(){
      var palette=String(gf("palette")).split("\n").map(function(l){l=l.trim();if(!l)return null;var p=l.split("::");return {name:(p[0]||"").trim(),hex:(p[1]||"").trim()};}).filter(Boolean);
      var materials=String(gf("materials")).split("\n").map(function(s){return s.trim();}).filter(Boolean);
      var tiles=String(gf("tiles")).split("\n").map(function(l){l=l.trim();if(!l)return null;var p=l.split("::");return {label:(p[0]||"").trim(),note:(p[1]||"").trim(),span:"",img:(p[2]||"").trim()};}).filter(Boolean);
      AURUM.mood=assign({},AURUM.mood||{},{palette:palette,materials:materials,tiles:tiles});
      setEdState("guardando…");
      Promise.all([
        postSheet({action:"list",tab:"Paleta",header:["name","hex"],rows:palette.map(function(p){return [p.name,p.hex];})}),
        postSheet({action:"list",tab:"Materiales",header:["material"],rows:materials.map(function(m){return [m];})}),
        postSheet({action:"list",tab:"Mood",header:["label","note","span","img"],rows:tiles.map(function(t){return [t.label,t.note,t.span,t.img];})})
      ]).then(function(){ setEdState("mood guardado ✓"); finishEd(true); })
       .catch(function(){ setEdState("guardado local; el Sheet no respondió",true); finishEd(false); });
    }

    /* --- historial --- */
    function openHist(){
      var h=(AURUM._history||[]).slice();
      var rows = h.length ? h.reverse().map(function(r){
        return '<div class="hist-row"><span class="hist-when">'+esc(r.when||"")+'</span><span class="hist-what"><b>'+esc(r.tab||"")+'</b> · '+esc(r.key||"")+' · '+esc(r.action||"")+'</span>'+(r.note?'<span class="hist-note">'+esc(r.note)+'</span>':'')+'</div>';
      }).join("") : '<p style="color:var(--ink-2);font-size:14px">Sin cambios registrados todavía. Aquí aparecerán las ediciones (con su fecha) una vez que el Apps Script esté actualizado.</p>';
      ED={kind:"hist"};
      document.getElementById("ed-title").textContent="Historial de cambios";
      document.getElementById("ed-body").innerHTML='<div class="hist">'+rows+'</div>';
      document.getElementById("ed-del").style.display="none";
      document.getElementById("ed-save").style.display="none";
      setEdState("");
      document.getElementById("editor").classList.add("on");
    }

    /* --- POST al Sheet (body simple para evitar preflight CORS) --- */
    function postSheet(payload){
      if(!CONFIG.SHEET_URL) return Promise.reject(new Error("sin URL"));
      payload.k=credencial();                                   /* credencial del Portero (lectura) */
      try{payload.secret=sessionStorage.getItem(WSEC_KEY)||"";}catch(e){payload.secret="";}  /* clave de escritura (la valida el servidor) */
      var ctrl=new AbortController(), t=setTimeout(function(){ctrl.abort();},CONFIG.FETCH_TIMEOUT);
      return fetch(CONFIG.SHEET_URL,{method:"POST",body:JSON.stringify(payload),signal:ctrl.signal})
        .then(function(r){ clearTimeout(t); return r.json(); })
        .then(function(j){ if(j&&j.ok) return j; if(j&&j.error==="liga") credencialRechazada(); throw new Error((j&&j.error)||"rechazado"); });
    }

    /* --- toast global --- */
    var TOAST_T=null;
    function showToast(msg,opts){ opts=opts||{};
      var el=document.getElementById("toast");
      if(!el){ el=document.createElement("div"); el.id="toast"; document.body.appendChild(el); }
      el.className=opts.warn?"warn":"";
      el.innerHTML=esc(msg)+(opts.action?' <button id="toastAct" type="button">'+esc(opts.action)+'</button>':'');
      if(opts.action&&opts.fn){ var b=el.querySelector("#toastAct"); if(b) b.onclick=function(){ hideToast(); opts.fn(); }; }
      el.classList.add("on"); clearTimeout(TOAST_T); TOAST_T=setTimeout(hideToast, opts.action?5200:3000);
    }
    function hideToast(){ var el=document.getElementById("toast"); if(el) el.classList.remove("on"); }

    /* --- cola de escrituras pendientes (reintento al volver la conexion) --- */
    var QKEY="aurum_postq_v1", QFLUSHING=false;
    function qload(){ try{ return JSON.parse(localStorage.getItem(QKEY))||[]; }catch(e){ return []; } }
    function qsave(q){ try{ localStorage.setItem(QKEY,JSON.stringify(q)); }catch(e){} }
    function queuePost(payload){ var q=qload(); q.push(payload); qsave(q); }
    function flushQueue(){
      if(QFLUSHING) return; if(!qload().length) return; QFLUSHING=true;
      (function step(){
        var q=qload();
        if(!q.length){ QFLUSHING=false; showToast("Cambios pendientes sincronizados con el Sheet"); return; }
        postSheet(assign({},q[0])).then(function(){ var q2=qload(); q2.shift(); qsave(q2); step(); })
          .catch(function(){ QFLUSHING=false; });
      })();
    }
    window.addEventListener("online",flushQueue);
    setInterval(flushQueue,45000);
    setTimeout(flushQueue,4000);

    function openSummary(){
      var bySpace={}, order=[];
      selected.forEach(function(id){var p=BUY_BY_ID[id]; if(!p) return; var sp=p.space||"Sin espacio asignado"; if(!bySpace[sp]){bySpace[sp]=[];order.push(sp);} bySpace[sp].push(p);});
      var spaceOrder=tbl("spaces").map(function(s){return s.name;});
      order.sort(function(a,b){ var ia=spaceOrder.indexOf(a),ib=spaceOrder.indexOf(b); ia=ia<0?999:ia; ib=ib<0?999:ib; return ia-ib; });
      var grand=0, html="";
      if(!order.length) html='<p class="sum-empty">Aún no hay piezas incluidas. Marca «Incluir» en las que entren a la propuesta.</p>';
      order.forEach(function(sp){
        var sub=0, rows="";
        bySpace[sp].forEach(function(p){ var line=num(p.price)*qn(p.qty); sub+=line; grand+=line;
          rows+='<div class="sum-row"><span class="sum-nm">'+esc(p.name)+(qn(p.qty)>1?' <small>×'+qn(p.qty)+'</small>':'')+'</span><span class="sum-pr">'+money(line)+'</span></div>';
        });
        html+='<div class="sum-group"><div class="sum-gh"><span>'+esc(sp)+'</span><b>'+money(sub)+'</b></div>'+rows+'</div>';
      });
      document.getElementById("sum-body").innerHTML=html;
      document.getElementById("sum-total").textContent=money(grand);
      document.getElementById("summary").classList.add("on");
    }

    /* ---- master render + routing ---- */
    function render(){
      var tb=document.getElementById("topbar"), sb=document.getElementById("selbar");
      if(state.screen==="gate"){ if(tb)tb.style.display="none"; if(sb)sb.style.display="none"; renderGate(); return; }
      if(state.screen==="landing"){ if(tb)tb.style.display="none"; if(sb)sb.style.display="none"; renderLanding(); return; }
      if(tb)tb.style.display="flex";
      renderBrand(); setDesignerBar(); renderHouse(); renderSelBar();
      setTimeout(scanImgs,80);
    }

    /* ---- events ---- */
    document.addEventListener("click",function(e){
      var t;
      if(e.target.closest("a[href]")) return;
      if(e.target.closest("#dzBtn")){ tryDesigner(); return; }
      if(e.target.closest("#dzHist")){ openHist(); return; }
      if(e.target.closest("#dzOut")){ exitDesigner(); return; }
      if((t=e.target.closest("[data-ed]"))){ var ea=t.getAttribute("data-ed"); if(ea==="save")edSave(); else if(ea==="del")edDelete(); else if(ea==="dup")edDuplicate(); else closeEd(); return; }
      if((t=e.target.closest("[data-hide]"))){ var phh=t.getAttribute("data-hide").split("|"); toggleHide(phh[0], phh[1]); return; }
      if((t=e.target.closest("[data-obssave]"))){ saveObs(t.getAttribute("data-obssave")); return; }
      if((t=e.target.closest("[data-edit]"))){ var pr=t.getAttribute("data-edit").split("|"); openEd(pr[0], pr[1]||""); return; }
      if((t=e.target.closest("[data-add]"))){ var pa=t.getAttribute("data-add").split("|"); openEd(pa[0]); if(pa[1]&&ED&&ED.rec){ ED.rec.category=pa[1]; renderRowEditor(); } return; }
      if(e.target.closest("#gateGo")){ tryGate(); return; }
      if((t=e.target.closest("[data-project]"))){ var pid=t.getAttribute("data-project"); var prj=projectById(pid); if(prj&&prj.url){ window.open(prj.url,"_blank","noopener"); return; } state.project=pid; if(isUnlocked(pid)){ state.screen="house"; state.view="espacios"; state.space=null; state.conceptOpen=false; } else { state.screen="gate"; } render(); return; }
      if((t=e.target.closest("[data-action]"))){
        var a=t.getAttribute("data-action");
        if(a==="to-landing"){ state.screen="landing"; state.space=null; render(); }
        else if(a==="toggle-concept"){ state.conceptOpen=!state.conceptOpen; render(); }
        return;
      }
      if((t=e.target.closest("[data-view]"))){ state.view=t.getAttribute("data-view"); state.space=null; render(); return; }
      if((t=e.target.closest("[data-type]"))){ state.type=t.getAttribute("data-type"); render(); return; }
      if((t=e.target.closest("[data-space]"))){ state.space=t.getAttribute("data-space"); state.roomCat=null; render(); return; }
      if(e.target.closest("[data-space-back]")){ state.space=null; render(); return; }
      if((t=e.target.closest("[data-roomcat]"))){ state.roomCat=t.getAttribute("data-roomcat"); refreshSelection(); var rj=document.querySelector&&document.querySelector(".room-jump"); if(rj && rj.scrollIntoView) rj.scrollIntoView({behavior:"smooth",block:"start"}); return; }
      if((t=e.target.closest("[data-sel]"))){ toggleSel(t.getAttribute("data-sel")); return; }
      if((t=e.target.closest("[data-zoom]"))){ openLB(t.getAttribute("data-zoom")); return; }
      if(e.target.id==="selAll"){ selected=[]; BUYABLE.forEach(function(p){ if(!p.grupo) selected.push(p.id); }); Object.keys(OPT_GROUPS).forEach(function(g){ var ids=OPT_GROUPS[g]; var a=ids.filter(function(id){return (BUY_BY_ID[id].opcion||"A")==="A";})[0]||ids[0]; if(a) selected.push(a); }); saveSel(); refreshSelection(); return; }
      if(e.target.id==="selNone"){ selected=[]; saveSel(); refreshSelection(); return; }
      if(e.target.id==="pdfBtn2"){ doPrint(); return; }
      if(e.target.closest("#sumBtn")){ openSummary(); return; }
      if(e.target.closest("#sumX")){ document.getElementById("summary").classList.remove("on"); return; }
    });
    document.getElementById("pdfBtn").addEventListener("click",doPrint);
    document.getElementById("refreshBtn").addEventListener("click",function(){ if(CONFIG.SHEET_URL) fetchData(true); else { setBadge("snapshot"); } });
    document.getElementById("badge").addEventListener("click",function(){ if(CONFIG.SHEET_URL) fetchData(true); });

    var LB={list:[],i:0};
    function collectLB(){
      LB.list=[];
      var els=document.querySelectorAll('#app [data-zoom]');
      for(var j=0;j<els.length;j++){
        var el=els[j], src=el.getAttribute('data-zoom'); if(!src) continue;
        var cap=el.getAttribute('alt')||"";
        if(!cap){ var im=el.querySelector?el.querySelector('img'):null; if(im) cap=im.getAttribute('alt')||""; }
        if(!cap){ var card=el.closest?el.closest('.item'):null; var h=card?card.querySelector('h4'):null; if(h) cap=h.textContent; }
        LB.list.push({src:src,cap:cap});
      }
    }
    function showLB(){
      var it=LB.list[LB.i]||{src:"",cap:""};
      var img=document.getElementById("lbimg");
      /* resetear estado de respaldo: cada imagen del lightbox empieza limpia */
      img.style.display=""; img.removeAttribute("data-fb"); img.removeAttribute("data-fb2");
      if(img.parentNode){ var oldPh=img.parentNode.querySelector(".ph"); if(oldPh) img.parentNode.removeChild(oldPh); }
      img.style.opacity=0; img.src=it.src; setTimeout(function(){img.style.opacity=1;},20);
      document.getElementById("lbcap").textContent=it.cap||"";
      var multi=LB.list.length>1;
      document.getElementById("lbcount").textContent=multi?(LB.i+1)+" / "+LB.list.length:"";
      document.getElementById("lbPrev").style.display=multi?"flex":"none";
      document.getElementById("lbNext").style.display=multi?"flex":"none";
    }
    function openLB(src){ collectLB(); LB.i=0; for(var i=0;i<LB.list.length;i++){ if(LB.list[i].src===src){ LB.i=i; break; } } if(!LB.list.length) LB.list=[{src:src,cap:""}]; document.getElementById("lb").classList.add("on"); showLB(); }
    function lbStep(d){ if(LB.list.length<2) return; LB.i=(LB.i+d+LB.list.length)%LB.list.length; showLB(); }
    document.getElementById("lb").addEventListener("click",function(e){
      if(e.target.closest("#lbPrev")){ lbStep(-1); return; }
      if(e.target.closest("#lbNext")){ lbStep(1); return; }
      if(e.target.closest("#lbx") || e.target===this){ this.classList.remove("on"); document.getElementById("lbimg").removeAttribute("src"); }
    });
    (function(){ var sx=null, sy=null, lbEl=document.getElementById("lb");
      lbEl.addEventListener("touchstart",function(e){ if(e.touches.length===1){ sx=e.touches[0].clientX; sy=e.touches[0].clientY; } },{passive:true});
      lbEl.addEventListener("touchend",function(e){ if(sx==null) return; var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy; sx=null;
        if(Math.abs(dx)>48 && Math.abs(dx)>Math.abs(dy)*1.5) lbStep(dx<0?1:-1); },{passive:true});
    })();
    document.getElementById("editor").addEventListener("click",function(e){ if(e.target===this) closeEd(); });
    document.getElementById("summary").addEventListener("click",function(e){ if(e.target===this) this.classList.remove("on"); });
    document.addEventListener("input",function(e){ if(e.target.closest && e.target.closest("#ed-body")) edAutosave(); });
    document.addEventListener("keydown",function(e){
      if(e.key==="Enter" && document.getElementById("gateInput")){ tryGate(); return; }
      var lbOn=document.getElementById("lb") && document.getElementById("lb").classList.contains("on");
      if(lbOn && e.key==="ArrowRight"){ lbStep(1); return; }
      if(lbOn && e.key==="ArrowLeft"){ lbStep(-1); return; }
      if(e.key==="Escape"){ var sm=document.getElementById("summary"); if(sm && sm.classList.contains("on")){ sm.classList.remove("on"); return; } var ed=document.getElementById("editor"); if(ed && ed.classList.contains("on")){ closeEd(); return; } var lb=document.getElementById("lb"); if(lb) lb.classList.remove("on"); }
    });

    /* ---- fade-in de imagenes ---- */
    document.addEventListener("load",function(e){ var im=e.target; if(im&&im.tagName==="IMG"&&im.closest&&im.closest("#app")) im.classList.add("ld"); },true);
    function scanImgs(){ var im=document.querySelectorAll("#app img:not(.ld)"); for(var i=0;i<im.length;i++){ if(im[i].complete&&im[i].naturalWidth>0) im[i].classList.add("ld"); } }
    setInterval(scanImgs,900);

    /* ---- init ---- */
    window.__SNAP_LOGO__ = (window.AURUM && window.AURUM.meta && window.AURUM.meta.logo) || "";
    try{ if(sessionStorage.getItem(DESIGNER_FLAG)==="1") state.designer=true; }catch(e){}
    if(AURUM._projects && AURUM._projects.length) PROJECTS=normalizeProjects(AURUM._projects);
    /* arranque instantáneo con caché local (si existe): el que regresa ve las tarjetas reales de inmediato;
       solo el primer ingreso (sin caché) ve el esqueleto hasta que llega el dato vivo. Nunca el snapshot viejo embebido. */
    try{ var _c=JSON.parse(localStorage.getItem(CACHE_KEY)); if(_c&&_c.meta){ if(!_c.meta.logo && window.__SNAP_LOGO__) _c.meta.logo=window.__SNAP_LOGO__; AURUM=_c; window.AURUM=_c; if(_c._projects&&_c._projects.length) PROJECTS=normalizeProjects(_c._projects); DATA_READY=true; } }catch(_e){}
    /* respaldo global de imágenes: si una falla, prueba endpoint alterno de Drive y luego placeholder */
    document.addEventListener("error", function(e){
      var img=e.target; if(!img || img.tagName!=="IMG") return;
      var src=img.getAttribute("src")||"";
      if(!src) return; /* src vacío (p.ej. al cerrar el lightbox) no es una imagen rota */
      var m=src.match(/[?&]id=([-\w]{16,})/)||src.match(/googleusercontent\.com\/d\/([-\w]{16,})/);
      var id=m?m[1]:"";
      if(id && !img.getAttribute("data-fb")){ img.setAttribute("data-fb","1"); img.src="https://drive.google.com/thumbnail?id="+id+"&sz=w1600"; return; }
      if(!img.getAttribute("data-fb2")){ img.setAttribute("data-fb2","1"); var ph=document.createElement("div"); ph.className="ph"; ph.textContent="Sin imagen"; img.style.display="none"; if(img.parentNode) img.parentNode.appendChild(ph); }
    }, true);
    loadSelection();
    render();
    fetchData(false);
  })();
  </script>
